<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFlow - Phone Flipping Ledger</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for rendering JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f8fafc;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
            Euro: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg>,
            Layers: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/></svg>,
            ShoppingCart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            BarChart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        };

        // Preloaded dataset matching your exact scenario
        const defaultPhones = [
            {
                id: '1',
                model: 'Note 14',
                imei: '358912345678901',
                buyPrice: 103,
                expectedSellPrice: 149,
                actualSellPrice: 149,
                buyDate: '2025-07-04',
                sellDate: '2025-07-11',
                reinvestment: false,
                notes: 'Part of initial 314€ Capital investment',
                buySequence: 1720051200000,
                sellSequence: 1720656000000
            },
            {
                id: '2',
                model: 'Galaxy A07',
                imei: '358912345678902',
                buyPrice: 92,
                expectedSellPrice: 125,
                actualSellPrice: 125,
                buyDate: '2025-07-04',
                sellDate: '2025-07-11',
                reinvestment: false,
                notes: 'Part of initial 314€ Capital investment',
                buySequence: 1720051200001,
                sellSequence: 1720656000001
            },
            {
                id: '3',
                model: 'Galaxy A17',
                imei: '358912345678903',
                buyPrice: 119,
                expectedSellPrice: 169,
                actualSellPrice: null,
                buyDate: '2025-07-04',
                sellDate: null, // UNSOLD
                reinvestment: false,
                notes: 'Part of initial 314€ Capital investment',
                buySequence: 1720051200002,
                sellSequence: null
            },
            {
                id: '4',
                model: 'Galaxy A07',
                imei: '358912345678904',
                buyPrice: 96,
                expectedSellPrice: 129,
                actualSellPrice: null,
                buyDate: '2025-07-16',
                sellDate: null, // UNSOLD
                reinvestment: true, // Reinvestment item
                notes: 'Reinvestment buy (reduces balance by 96)',
                buySequence: 1721088000000,
                sellSequence: null
            }
        ];

        function App() {
            const [phones, setPhones] = useState(() => {
                const local = localStorage.getItem('flipflow_inventory');
                return local ? JSON.parse(local) : defaultPhones;
            });

            const [toasts, setToasts] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [filterModel, setFilterModel] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');

            // Modals
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isSellModalOpen, setIsSellModalOpen] = useState(false);
            const [selectedPhone, setSelectedPhone] = useState(null);

            useEffect(() => {
                localStorage.setItem('flipflow_inventory', JSON.stringify(phones));
            }, [phones]);

            const triggerToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            // Dynamic Ledger Balance Engine
            const ledger = useMemo(() => {
                let list = [];
                phones.forEach(p => {
                    // Purchase Event
                    list.push({
                        id: `${p.id}-buy`,
                        phoneId: p.id,
                        date: p.buyDate,
                        sequence: p.buySequence || Date.now(),
                        model: p.model,
                        type: p.reinvestment ? 'REINVEST_BUY' : 'INITIAL_BUY',
                        amount: p.reinvestment ? -Number(p.buyPrice) : 0,
                        description: p.reinvestment 
                            ? `Reinvestment Purchase — ${p.model}` 
                            : `Initial Inventory — ${p.model}`
                    });

                    // Sell Event (Only if status is Sold / Sell Date exists)
                    if (p.sellDate) {
                        list.push({
                            id: `${p.id}-sell`,
                            phoneId: p.id,
                            date: p.sellDate,
                            sequence: p.sellSequence || Date.now() + 1,
                            model: p.model,
                            type: 'SELL',
                            amount: Number(p.actualSellPrice || p.expectedSellPrice),
                            description: `Sold — ${p.model}`
                        });
                    }
                });

                // Chronological Sorting
                list.sort((a, b) => {
                    const diff = new Date(a.date) - new Date(b.date);
                    if (diff !== 0) return diff;
                    return a.sequence - b.sequence;
                });

                let running = 0;
                return list.map(item => {
                    running += item.amount;
                    return { ...item, balance: running };
                });
            }, [phones]);

            // Financial Calculations
            const stats = useMemo(() => {
                const availableCash = ledger.length > 0 ? ledger[ledger.length - 1].balance : 0;
                
                let inventoryCost = 0;
                let inventoryMarketValue = 0;
                let totalSales = 0;
                let totalProfit = 0;
                let phonesSold = 0;
                let phonesInStock = 0;
                
                // Track expected total sales when everything (sold & unsold) completes
                let potentialSalesRevenue = 0;

                phones.forEach(p => {
                    const isSold = !!p.sellDate;
                    const expectedVal = Number(p.expectedSellPrice);
                    const actualVal = Number(p.actualSellPrice || p.expectedSellPrice);

                    if (!isSold) {
                        inventoryCost += Number(p.buyPrice);
                        inventoryMarketValue += expectedVal;
                        phonesInStock++;
                        potentialSalesRevenue += expectedVal;
                    } else {
                        totalSales += actualVal;
                        totalProfit += (actualVal - Number(p.buyPrice));
                        phonesSold++;
                        potentialSalesRevenue += actualVal;
                    }
                });

                return {
                    availableCash,
                    inventoryCost,
                    inventoryMarketValue,
                    totalSales,
                    totalProfit,
                    phonesSold,
                    phonesInStock,
                    potentialSalesRevenue // This represents the 572€ total revenue when fully sold!
                };
            }, [phones, ledger]);

            // Filtered lists
            const filteredPhones = useMemo(() => {
                return phones.filter(p => {
                    const matchesSearch = p.model.toLowerCase().includes(searchTerm.toLowerCase()) || (p.imei && p.imei.includes(searchTerm));
                    const matchesModel = filterModel ? p.model === filterModel : true;
                    const matchesStatus = filterStatus === 'all' ? true : (filterStatus === 'sold' ? !!p.sellDate : !p.sellDate);
                    return matchesSearch && matchesModel && matchesStatus;
                });
            }, [phones, searchTerm, filterModel, filterStatus]);

            // Status Toggle Controller (Sold <-> Unsold)
            const handleToggleStatus = (phone, targetStatus) => {
                if (targetStatus === 'sold') {
                    // Open fast modal to enter prices
                    setSelectedPhone(phone);
                    setIsSellModalOpen(true);
                } else {
                    // Transition back to unsold (In Stock)
                    setPhones(prev => prev.map(p => {
                        if (p.id === phone.id) {
                            return {
                                ...p,
                                sellDate: null,
                                actualSellPrice: null,
                                sellSequence: null
                            };
                        }
                        return p;
                    }));
                    triggerToast(`${phone.model} marked back to Unsold (In Stock)`, 'warning');
                }
            };

            const handleAddPhone = (formData) => {
                const newPhone = {
                    ...formData,
                    id: 'phone-' + Date.now(),
                    buySequence: Date.now(),
                    sellSequence: formData.sellDate ? Date.now() + 1 : null
                };
                setPhones(prev => [...prev, newPhone]);
                triggerToast(`Added: ${formData.model}`, 'success');
            };

            const handleEditPhone = (updatedPhone) => {
                setPhones(prev => prev.map(p => {
                    if (p.id === updatedPhone.id) {
                        return {
                            ...updatedPhone,
                            sellSequence: updatedPhone.sellDate && !p.sellDate ? Date.now() : p.sellSequence
                        };
                    }
                    return p;
                }));
                triggerToast(`Saved details for ${updatedPhone.model}`, 'success');
            };

            const handleDeletePhone = (id) => {
                if (window.confirm("Delete this entry? This modifies ledger history.")) {
                    setPhones(prev => prev.filter(p => p.id !== id));
                    triggerToast("Entry deleted", "warning");
                }
            };

            return (
                <div class="flex flex-col md:flex-row min-h-screen text-slate-100 bg-slate-950">
                    {/* Sidebar */}
                    <aside class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 p-6 flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-8">
                                <div class="bg-indigo-600 p-2.5 rounded-xl">
                                    <Icons.Euro />
                                </div>
                                <div>
                                    <h1 class="text-xl font-bold tracking-tight">FlipFlow</h1>
                                    <span class="text-xs text-indigo-400 font-semibold tracking-wider uppercase">Flipping Engine</span>
                                </div>
                            </div>

                            <nav class="space-y-1.5">
                                <button onClick={() => setActiveTab('dashboard')} class={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <Icons.BarChart /> Dashboard
                                </button>
                                <button onClick={() => setActiveTab('inventory')} class={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'inventory' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <Icons.Layers /> Inventory List
                                </button>
                                <button onClick={() => setActiveTab('ledger')} class={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${activeTab === 'ledger' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                    <Icons.History /> Ledger History
                                </button>
                            </nav>
                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-800/60 text-center text-xs text-slate-500 font-medium">
                            FlipFlow Ledger System v1.1
                        </div>
                    </aside>

                    {/* Content */}
                    <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full">
                        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                            <div>
                                <h2 class="text-2xl md:text-3xl font-extrabold tracking-tight text-white capitalize">{activeTab} View</h2>
                                <p class="text-slate-400 text-sm">Managing phone resale inventory with real-world ledger entries.</p>
                            </div>
                            <button onClick={() => setIsAddModalOpen(true)} class="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white font-bold rounded-xl text-sm hover:bg-indigo-700 transition-all">
                                <Icons.Plus /> Register New Purchase
                            </button>
                        </header>

                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div class="space-y-6">
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                                    <div class="bg-slate-900/50 backdrop-blur-md border border-slate-800/80 p-5 rounded-2xl">
                                        <div class="flex justify-between items-center text-slate-400 text-xs font-semibold">
                                            <span>AVAILABLE CASH</span>
                                            <span class="text-emerald-400 p-1 bg-emerald-500/10 rounded-md"><Icons.Euro /></span>
                                        </div>
                                        <h3 class="text-3xl font-black text-emerald-400 mt-3">{stats.availableCash}€</h3>
                                        <p class="text-[10px] text-slate-500 mt-1">Reflects cash currently in hand</p>
                                    </div>

                                    <div class="bg-slate-900/50 backdrop-blur-md border border-slate-800/80 p-5 rounded-2xl">
                                        <div class="flex justify-between items-center text-slate-400 text-xs font-semibold">
                                            <span>TOTAL REVENUE TARGET</span>
                                            <span class="text-indigo-400 p-1 bg-indigo-500/10 rounded-md"><Icons.TrendingUp /></span>
                                        </div>
                                        <h3 class="text-3xl font-black text-indigo-400 mt-3">{stats.potentialSalesRevenue}€</h3>
                                        <p class="text-[10px] text-slate-500 mt-1">Total combined sales value target</p>
                                    </div>

                                    <div class="bg-slate-900/50 backdrop-blur-md border border-slate-800/80 p-5 rounded-2xl">
                                        <div class="flex justify-between items-center text-slate-400 text-xs font-semibold">
                                            <span>FROZEN INVENTORY COST</span>
                                            <span class="text-amber-400 p-1 bg-amber-500/10 rounded-md"><Icons.Layers /></span>
                                        </div>
                                        <h3 class="text-3xl font-black text-white mt-3">{stats.inventoryCost}€</h3>
                                        <p class="text-[10px] text-slate-500 mt-1">Unsold units cost</p>
                                    </div>

                                    <div class="bg-slate-900/50 backdrop-blur-md border border-slate-800/80 p-5 rounded-2xl">
                                        <div class="flex justify-between items-center text-slate-400 text-xs font-semibold">
                                            <span>COMPLETED PROFIT</span>
                                            <span class="text-teal-400 p-1 bg-teal-500/10 rounded-md"><Icons.TrendingUp /></span>
                                        </div>
                                        <h3 class="text-3xl font-black text-teal-400 mt-3">{stats.totalProfit}€</h3>
                                        <p class="text-[10px] text-slate-500 mt-1">Net difference of completed sales</p>
                                    </div>
                                </div>

                                <div class="bg-indigo-950/20 border border-indigo-900/40 p-5 rounded-2xl flex items-start gap-4">
                                    <span class="p-2 bg-indigo-500/10 text-indigo-400 rounded-xl"><Icons.Info /></span>
                                    <div>
                                        <h4 class="text-sm font-bold text-white">Current Cash Ledger Validation Summary</h4>
                                        <p class="text-xs text-slate-300 mt-1 leading-relaxed">
                                            Your original starting capital was <strong>314€</strong> (used on your first three purchases). 
                                            You sold 2 of those units generating <strong>274€</strong>, then reinvested <strong>96€</strong> into buying your 4th phone. 
                                            This leaves you with exactly <strong class="text-emerald-400">178€ in available cash</strong> and 2 unsold phones (Galaxy A17 & Galaxy A07). 
                                            Once those final 2 phones sell for their expected values, your total business sales revenue will reach <strong class="text-indigo-400">572€</strong>!
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* INVENTORY */}
                        {activeTab === 'inventory' && (
                            <div class="space-y-6">
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <div class="flex-1 relative">
                                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500"><Icons.Search /></span>
                                        <input 
                                            type="text" 
                                            placeholder="Search phone model..." 
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            class="w-full bg-slate-900 border border-slate-800 rounded-xl py-2 pl-9 pr-4 text-sm text-white focus:outline-none focus:border-indigo-500"
                                        />
                                    </div>
                                    <select 
                                        value={filterStatus} 
                                        onChange={(e) => setFilterStatus(e.target.value)}
                                        class="bg-slate-900 border border-slate-800 text-sm text-slate-300 rounded-xl px-4 py-2 focus:outline-none"
                                    >
                                        <option value="all">All Statuses</option>
                                        <option value="in-stock">In Stock (Unsold)</option>
                                        <option value="sold">Sold</option>
                                    </select>
                                </div>

                                <div class="bg-slate-900/30 border border-slate-800/80 rounded-2xl overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-slate-900 border-b border-slate-800 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                                                    <th class="py-4 px-5">Model</th>
                                                    <th class="py-4 px-5">Buy Price</th>
                                                    <th class="py-4 px-5">Expected Price</th>
                                                    <th class="py-4 px-5">Actual Sold Price</th>
                                                    <th class="py-4 px-5">Status Switcher</th>
                                                    <th class="py-4 px-5">Reinvestment</th>
                                                    <th class="py-4 px-5 text-right">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-800/60 text-sm">
                                                {filteredPhones.map(phone => {
                                                    const isSold = !!phone.sellDate;
                                                    return (
                                                        <tr key={phone.id} class="hover:bg-slate-900/40 transition-colors">
                                                            <td class="py-4 px-5 font-bold text-white">
                                                                {phone.model}
                                                                {phone.notes && <p class="text-[10px] text-slate-500 font-normal mt-0.5">{phone.notes}</p>}
                                                            </td>
                                                            <td class="py-4 px-5">{phone.buyPrice}€</td>
                                                            <td class="py-4 px-5 text-slate-400">{phone.expectedSellPrice}€</td>
                                                            <td class="py-4 px-5 font-bold text-emerald-400">
                                                                {isSold ? `${phone.actualSellPrice}€` : <span class="text-slate-600 font-normal">Unsold</span>}
                                                            </td>
                                                            <td class="py-4 px-5">
                                                                {/* Status toggle element */}
                                                                <select 
                                                                    value={isSold ? 'sold' : 'in-stock'}
                                                                    onChange={(e) => handleToggleStatus(phone, e.target.value)}
                                                                    class={`text-xs font-semibold px-2 py-1 rounded-lg border focus:outline-none cursor-pointer ${isSold ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-sky-500/10 border-sky-500/30 text-sky-400'}`}
                                                                >
                                                                    <option class="bg-slate-900 text-sky-400" value="in-stock">In Stock (Unsold)</option>
                                                                    <option class="bg-slate-900 text-emerald-400" value="sold">Sold</option>
                                                                </select>
                                                            </td>
                                                            <td class="py-4 px-5">
                                                                <span class={`text-[10px] uppercase font-bold px-2 py-0.5 rounded-full ${phone.reinvestment ? 'bg-amber-500/15 text-amber-400' : 'bg-slate-800 text-slate-400'}`}>
                                                                    {phone.reinvestment ? "Reinvest" : "Initial Cap"}
                                                                </span>
                                                            </td>
                                                            <td class="py-4 px-5 text-right space-x-2">
                                                                <button onClick={() => { setSelectedPhone(phone); setIsEditModalOpen(true); }} class="p-1.5 text-slate-400 hover:text-indigo-400 hover:bg-slate-800 rounded-lg transition-colors inline-block">
                                                                    <Icons.Edit />
                                                                </button>
                                                                <button onClick={() => handleDeletePhone(phone.id)} class="p-1.5 text-slate-400 hover:text-rose-500 hover:bg-slate-800 rounded-lg transition-colors inline-block">
                                                                    <Icons.Trash />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* LEDGER */}
                        {activeTab === 'ledger' && (
                            <div class="bg-slate-900/30 border border-slate-800/80 rounded-2xl overflow-hidden">
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="bg-slate-900 border-b border-slate-800 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                                                <th class="py-4 px-5">Effective Date</th>
                                                <th class="py-4 px-5">Type of Entry</th>
                                                <th class="py-4 px-5">Details</th>
                                                <th class="py-4 px-5">Cash Impact</th>
                                                <th class="py-4 px-5">Running Cash Balance</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-800/60 font-mono text-xs">
                                            {ledger.slice().reverse().map(tx => (
                                                <tr key={tx.id} class="hover:bg-slate-900/40 transition-colors">
                                                    <td class="py-4 px-5 text-slate-400">{tx.date}</td>
                                                    <td class="py-4 px-5">
                                                        <span class={`px-2 py-0.5 rounded-full text-[9px] uppercase font-bold ${tx.type === 'SELL' ? 'bg-emerald-500/10 text-emerald-400' : tx.type === 'REINVEST_BUY' ? 'bg-amber-500/10 text-amber-400' : 'bg-slate-800 text-slate-400'}`}>
                                                            {tx.type}
                                                        </span>
                                                    </td>
                                                    <td class="py-4 px-5 text-slate-200 font-sans font-medium text-sm">{tx.description}</td>
                                                    <td class={`py-4 px-5 text-sm font-bold ${tx.amount > 0 ? 'text-emerald-400' : tx.amount < 0 ? 'text-rose-400' : 'text-slate-500'}`}>
                                                        {tx.amount > 0 ? `+${tx.amount}€` : tx.amount < 0 ? `${tx.amount}€` : "0€ (Initial Cap)"}
                                                    </td>
                                                    <td class="py-4 px-5 text-sm font-extrabold text-indigo-300">{tx.balance}€</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* TOAST SYSTEM */}
                    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 max-w-sm w-full">
                        {toasts.map(t => (
                            <div key={t.id} class="p-4 bg-slate-900 border border-slate-800 text-slate-200 rounded-xl shadow-2xl flex items-start gap-3">
                                <span class="mt-0.5"><Icons.Info /></span>
                                <div class="text-xs font-semibold">{t.message}</div>
                            </div>
                        ))}
                    </div>

                    {/* ADD MODAL */}
                    {isAddModalOpen && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl overflow-hidden">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Register New Purchase</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleAddPhone({
                                        model: fd.get('model'),
                                        imei: fd.get('imei'),
                                        buyPrice: Number(fd.get('buyPrice')),
                                        expectedSellPrice: Number(fd.get('expectedSellPrice')),
                                        actualSellPrice: null,
                                        buyDate: fd.get('buyDate'),
                                        sellDate: null,
                                        reinvestment: fd.get('reinvestment') === 'on',
                                        notes: fd.get('notes')
                                    });
                                    setIsAddModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Model Name *</label>
                                            <input required name="model" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">IMEI</label>
                                            <input name="imei" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Buy Price (€) *</label>
                                            <input required name="buyPrice" type="number" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Expected Sale Price (€) *</label>
                                            <input required name="expectedSellPrice" type="number" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Purchase Date *</label>
                                        <input required name="buyDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Internal Notes</label>
                                        <textarea name="notes" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white"></textarea>
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
                                        <input type="checkbox" name="reinvestment" id="chk" class="w-4 h-4 text-indigo-600 rounded bg-slate-950 border-slate-800" />
                                        <label for="chk" class="text-xs text-slate-300 font-bold cursor-pointer">Reinvestment Buy (Immediately subtracts from Cash Balance)</label>
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} class="px-4 py-2 border border-slate-800 rounded-xl text-sm">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold">Register Unit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {isEditModalOpen && selectedPhone && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl overflow-hidden">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Edit Phone Details</h3>
                                    <button onClick={() => setIsEditModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleEditPhone({
                                        ...selectedPhone,
                                        model: fd.get('model'),
                                        imei: fd.get('imei'),
                                        buyPrice: Number(fd.get('buyPrice')),
                                        expectedSellPrice: Number(fd.get('expectedSellPrice')),
                                        actualSellPrice: fd.get('actualSellPrice') ? Number(fd.get('actualSellPrice')) : null,
                                        buyDate: fd.get('buyDate'),
                                        sellDate: fd.get('sellDate') || null,
                                        reinvestment: fd.get('reinvestment') === 'on',
                                        notes: fd.get('notes')
                                    });
                                    setIsEditModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Model Name *</label>
                                            <input required name="model" type="text" defaultValue={selectedPhone.model} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">IMEI</label>
                                            <input name="imei" type="text" defaultValue={selectedPhone.imei || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-3 gap-3">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Buy Price *</label>
                                            <input required name="buyPrice" type="number" defaultValue={selectedPhone.buyPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Expected Sale *</label>
                                            <input required name="expectedSellPrice" type="number" defaultValue={selectedPhone.expectedSellPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Actual Sold Price</label>
                                            <input name="actualSellPrice" type="number" defaultValue={selectedPhone.actualSellPrice || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Purchase Date</label>
                                            <input required name="buyDate" type="date" defaultValue={selectedPhone.buyDate} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Sell Date (blank if unsold)</label>
                                            <input name="sellDate" type="date" defaultValue={selectedPhone.sellDate || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Notes</label>
                                        <textarea name="notes" defaultValue={selectedPhone.notes || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white"></textarea>
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
                                        <input type="checkbox" name="reinvestment" id="chk2" defaultChecked={selectedPhone.reinvestment} class="w-4 h-4 text-indigo-600 rounded bg-slate-950 border-slate-800" />
                                        <label for="chk2" class="text-xs text-slate-300 font-bold cursor-pointer">Reinvestment Buy</label>
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsEditModalOpen(false)} class="px-4 py-2 border border-slate-800 rounded-xl text-sm">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* SELL CONFIRM MODAL */}
                    {isSellModalOpen && selectedPhone && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl overflow-hidden">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Record Sale Details</h3>
                                    <button onClick={() => setIsSellModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const price = Number(fd.get('actualSellPrice'));
                                    const date = fd.get('sellDate');

                                    setPhones(prev => prev.map(p => {
                                        if (p.id === selectedPhone.id) {
                                            return {
                                                ...p,
                                                actualSellPrice: price,
                                                sellDate: date,
                                                sellSequence: Date.now()
                                            };
                                        }
                                        return p;
                                    }));
                                    setIsSellModalOpen(false);
                                    triggerToast(`Sold ${selectedPhone.model} for ${price}€!`, 'success');
                                }} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Actual Sold Price (€) *</label>
                                        <input required name="actualSellPrice" type="number" defaultValue={selectedPhone.expectedSellPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Sell Date *</label>
                                        <input required name="sellDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsSellModalOpen(false)} class="px-4 py-2 border border-slate-800 rounded-xl text-sm">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-bold">Complete Sale</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

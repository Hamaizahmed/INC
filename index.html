            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,

            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.42-1.89-1.74-3.5-4-3.5-2.65 0-4.5 2.24-4.5 5 0 .26.01.52.03.77A4.47 4.47 0 0 0 2 17.5 4.5 4.5 0 0 0 6.5 22h11Z"/></svg>
        };

        const defaultPhones = [
            {
                id: '1',
                model: 'Note 14',
                imei: '358912345678901',
                buyPrice: 103,
                expectedSellPrice: 149,
                actualSellPrice: 149,

                reinvestment: false,

            },
            {

                buyPrice: 92,
                expectedSellPrice: 125,
                actualSellPrice: 125,
                buyDate: '2025-07-04',
                sellDate: '2025-07-11',
                reinvestment: false,
                notes: 'Part of initial 314€ Capital investment',
                buySequence: 1720051200001,
                sellSequence: 1720656000001
            },
            {
                id: '3',
                model: 'Galaxy A17',
                imei: '358912345678903',
                buyPrice: 119,
                expectedSellPrice: 169,
                actualSellPrice: null,
                buyDate: '2025-07-04',
                sellDate: null, 
                reinvestment: false,
                notes: 'Part of initial 314€ Capital investment',
                buySequence: 1720051200002,
                sellSequence: null
            },
            {
                id: '4',
                model: 'Galaxy A07',
                imei: '358912345678904',
                buyPrice: 96,
                expectedSellPrice: 129,
                actualSellPrice: null,
                buyDate: '2025-07-16',
                sellDate: null, 
                reinvestment: true, 
                notes: 'Reinvestment purchase',
                buySequence: 1721088000000,
                sellSequence: null
            }
        ];

        function App() {
            // Unlocked State (Passcode '314')
            const [isUnlocked, setIsUnlocked] = useState(() => sessionStorage.getItem('flipflow_unlocked') === 'true');
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState(false);

            const [phones, setPhones] = useState(() => {
                const local = localStorage.getItem('flipflow_inventory');
                return local ? JSON.parse(local) : defaultPhones;
            });

            const [toasts, setToasts] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [syncLoading, setSyncLoading] = useState(false);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [filterModel, setFilterModel] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterReinvestment, setFilterReinvestment] = useState('all');

            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isSellModalOpen, setIsSellModalOpen] = useState(false);
            const [selectedPhone, setSelectedPhone] = useState(null);

            const triggerToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            // Fetch Cloud Data from Supabase on App Startup
            useEffect(() => {
                if (supabase) {
                    setSyncLoading(true);
                    supabase
                        .from('ledger_store')
                        .select('phones')
                        .eq('id', 'main_inventory')
                        .single()
                        .then(({ data, error }) => {
                            if (!error && data && data.phones) {
                                setPhones(data.phones);
                                localStorage.setItem('flipflow_inventory', JSON.stringify(data.phones));
                                triggerToast("Cloud Sync: Loaded latest data successfully!", "success");
                            } else {
                                pushToCloud(phones);
                            }
                        })
                        .catch(() => triggerToast("Cloud Sync Offline. Using Local Storage.", "warning"))
                        .finally(() => setSyncLoading(false));
                }
            }, []);

            // Helper to upload data to Supabase
            const pushToCloud = (dataToPush) => {
                if (!supabase) return;
                setSyncLoading(true);
                supabase
                    .from('ledger_store')
                    .upsert({ id: 'main_inventory', phones: dataToPush })
                    .then(({ error }) => {
                        if (error) throw error;
                        triggerToast("Synced successfully with Supabase Cloud!", "success");
                    })
                    .catch(() => triggerToast("Failed to write to Cloud. Queue saved locally.", "warning"))
                    .finally(() => setSyncLoading(false));
            };

            const updatePhonesAndPersist = (newPhones) => {
                setPhones(newPhones);
                localStorage.setItem('flipflow_inventory', JSON.stringify(newPhones));
                pushToCloud(newPhones);
            };

            const handleForceRefresh = () => {
                if (!supabase) {
                    triggerToast("Supabase is not configured.", "warning");
                    return;
                }
                setSyncLoading(true);
                supabase
                    .from('ledger_store')
                    .select('phones')
                    .eq('id', 'main_inventory')
                    .single()
                    .then(({ data, error }) => {
                        if (!error && data && data.phones) {
                            setPhones(data.phones);
                            localStorage.setItem('flipflow_inventory', JSON.stringify(data.phones));
                            triggerToast("Pulled latest cloud data successfully!", "success");
                        }
                    })
                    .catch(() => triggerToast("Failed to fetch cloud database.", "warning"))
                    .finally(() => setSyncLoading(false));
            };

            const handleUnlock = (e) => {
                e.preventDefault();
                if (passwordInput === '314') {
                    setIsUnlocked(true);
                    sessionStorage.setItem('flipflow_unlocked', 'true');
                    setPasswordError(false);
                    triggerToast("System unlocked.", "success");
                } else {
                    setPasswordError(true);
                    setPasswordInput('');
                }
            };

            // Dynamic Ledger Sequence Balance Builder
            const ledger = useMemo(() => {
                let list = [];
                phones.forEach(p => {
                    list.push({
                        id: `${p.id}-buy`,
                        phoneId: p.id,
                        date: p.buyDate,
                        sequence: p.buySequence || Date.now(),
                        model: p.model,
                        type: p.reinvestment ? 'REINVEST_BUY' : 'INITIAL_BUY',
                        amount: p.reinvestment ? -Number(p.buyPrice) : 0,
                        description: p.reinvestment 
                            ? `Reinvestment Purchase — ${p.model}` 
                            : `Initial Inventory — ${p.model}`
                    });

                    if (p.sellDate) {
                        list.push({
                            id: `${p.id}-sell`,
                            phoneId: p.id,
                            date: p.sellDate,
                            sequence: p.sellSequence || Date.now() + 1,
                            model: p.model,
                            type: 'SELL',
                            amount: Number(p.actualSellPrice || p.expectedSellPrice),
                            description: `Sold — ${p.model}`
                        });
                    }
                });

                list.sort((a, b) => {
                    const diff = new Date(a.date) - new Date(b.date);
                    if (diff !== 0) return diff;
                    return a.sequence - b.sequence;
                });

                let running = 0;
                return list.map(item => {
                    running += item.amount;
                    return { ...item, balance: running };
                });
            }, [phones]);

            const stats = useMemo(() => {
                const availableCash = ledger.length > 0 ? ledger[ledger.length - 1].balance : 0;
                
                let inventoryCost = 0;
                let inventoryMarketValue = 0;
                let totalSales = 0;
                let totalProfit = 0;
                let phonesSold = 0;
                let phonesInStock = 0;
                let totalDaysToSell = 0;
                let soldBuyPriceSum = 0;
                let potentialSalesRevenue = 0;

                let highestProfit = -Infinity;
                let lowestProfit = Infinity;
                let highestProfitPhone = null;
                let lowestProfitPhone = null;

                let fastestSale = Infinity;
                let slowestSale = -Infinity;

                phones.forEach(p => {
                    const isSold = !!p.sellDate;
                    const buyVal = Number(p.buyPrice);
                    const expectedVal = Number(p.expectedSellPrice);
                    const actualVal = Number(p.actualSellPrice || p.expectedSellPrice);

                    if (!isSold) {
                        inventoryCost += buyVal;
                        inventoryMarketValue += expectedVal;
                        phonesInStock++;
                        potentialSalesRevenue += expectedVal;
                    } else {
                        const profit = actualVal - buyVal;
                        totalSales += actualVal;
                        totalProfit += profit;
                        phonesSold++;
                        soldBuyPriceSum += buyVal;
                        potentialSalesRevenue += actualVal;

                        const days = Math.max(0, Math.round((new Date(p.sellDate) - new Date(p.buyDate)) / 86400000));
                        totalDaysToSell += days;

                        if (days < fastestSale) fastestSale = days;
                        if (days > slowestSale) slowestSale = days;

                        if (profit > highestProfit) {
                            highestProfit = profit;
                            highestProfitPhone = p;
                        }
                        if (profit < lowestProfit) {
                            lowestProfit = profit;
                            lowestProfitPhone = p;
                        }
                    }
                });

                return {
                    availableCash,
                    inventoryCost,
                    inventoryMarketValue,
                    totalSales,
                    totalProfit,
                    phonesSold,
                    phonesInStock,
                    avgProfit: phonesSold > 0 ? totalProfit / phonesSold : 0,
                    avgDays: phonesSold > 0 ? totalDaysToSell / phonesSold : 0,
                    roi: soldBuyPriceSum > 0 ? (totalProfit / soldBuyPriceSum) * 100 : 0,
                    highestProfit: highestProfit === -Infinity ? 0 : highestProfit,
                    highestProfitPhone,
                    lowestProfit: lowestProfit === Infinity ? 0 : lowestProfit,
                    lowestProfitPhone,
                    fastestSale: fastestSale === Infinity ? 0 : fastestSale,
                    slowestSale: slowestSale === -Infinity ? 0 : slowestSale,
                    potentialSalesRevenue,
                    soldBuyPriceSum
                };
            }, [phones, ledger]);

            const filteredPhones = useMemo(() => {
                return phones.filter(p => {
                    const matchesSearch = p.model.toLowerCase().includes(searchTerm.toLowerCase()) || (p.imei && p.imei.includes(searchTerm));
                    const matchesModel = filterModel ? p.model === filterModel : true;
                    const matchesStatus = filterStatus === 'all' ? true : (filterStatus === 'sold' ? !!p.sellDate : !p.sellDate);
                    const matchesReinvest = filterReinvestment === 'all' ? true : (filterReinvestment === 'yes' ? p.reinvestment : !p.reinvestment);
                    return matchesSearch && matchesModel && matchesStatus && matchesReinvest;
                });
            }, [phones, searchTerm, filterModel, filterStatus, filterReinvestment]);

            const uniqueModels = useMemo(() => {
                return [...new Set(phones.map(p => p.model))];
            }, [phones]);

            const handleToggleStatus = (phone, targetStatus) => {
                if (targetStatus === 'sold') {
                    setSelectedPhone(phone);
                    setIsSellModalOpen(true);
                } else {
                    const updated = phones.map(p => {
                        if (p.id === phone.id) {
                            return { ...p, sellDate: null, actualSellPrice: null, sellSequence: null };
                        }
                        return p;
                    });
                    updatePhonesAndPersist(updated);
                    triggerToast(`${phone.model} marked back to Unsold`, 'warning');
                }
            };

            const handleAddPhone = (formData) => {
                const newPhone = {
                    ...formData,
                    id: 'phone-' + Date.now(),
                    buySequence: Date.now(),
                    sellSequence: formData.sellDate ? Date.now() + 1 : null
                };
                updatePhonesAndPersist([...phones, newPhone]);
            };

            const handleEditPhone = (updatedPhone) => {
                const updated = phones.map(p => {
                    if (p.id === updatedPhone.id) {
                        return {
                            ...updatedPhone,
                            sellSequence: updatedPhone.sellDate && !p.sellDate ? Date.now() : p.sellSequence
                        };
                    }
                    return p;
                });
                updatePhonesAndPersist(updated);
            };

            const handleDeletePhone = (id) => {
                if (window.confirm("Delete this entry? This modifies ledger history.")) {
                    const updated = phones.filter(p => p.id !== id);
                    updatePhonesAndPersist(updated);
                }
            };

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "Phone Model,IMEI,Buy Price,Expected Sell Price,Actual Sell Price,Buy Date,Sell Date,Reinvestment,Notes\n";
                phones.forEach(p => {
                    const row = [
                        `"${p.model}"`,
                        `"${p.imei || ''}"`,
                        p.buyPrice,
                        p.expectedSellPrice,
                        p.actualSellPrice || '',
                        p.buyDate,
                        p.sellDate || '',
                        p.reinvestment ? 'Yes' : 'No',
                        `"${p.notes || ''}"`
                    ].join(",");
                    csvContent += row + "\n";
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `flipflow_export_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                triggerToast("CSV Sheet exported successfully", "success");
            };

            const exportJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(phones, null, 2));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `flipflow_backup_${new Date().toISOString().split('T')[0]}.json`);
                dlAnchorElem.click();
                triggerToast("Local JSON database exported", "success");
            };

            const importJSON = (e) => {
                const fileReader = new FileReader();
                fileReader.onload = event => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            updatePhonesAndPersist(parsed);
                            triggerToast("Database successfully restored from JSON file!", "success");
                        } else {
                            triggerToast("Invalid format. Expecting JSON array.", "warning");
                        }
                    } catch (err) {
                        triggerToast("Failed to parse file structure.", "warning");
                    }
                };
                fileReader.readAsText(e.target.files[0]);
            };

            if (!isUnlocked) {
                return (
                    <div class="min-h-screen bg-slate-950 flex items-center justify-center p-4 relative overflow-hidden">
                        <div class="absolute w-[300px] h-[300px] bg-indigo-600/10 blur-[120px] rounded-full top-1/4 left-1/3"></div>
                        <div class="absolute w-[250px] h-[250px] bg-purple-600/10 blur-[100px] rounded-full bottom-1/4 right-1/3"></div>

                        <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-xl border border-slate-800/80 p-8 rounded-3xl shadow-2xl relative z-10 text-center">
                            <div class="inline-flex p-4 bg-indigo-500/10 text-indigo-400 rounded-2xl mb-5 shadow-inner">
                                <Icons.Lock />
                            </div>
                            <h1 class="text-2xl font-black tracking-tight text-white mb-2">FlipFlow Hub</h1>
                            <p class="text-xs text-slate-400 mb-6 leading-relaxed">Financial ledger protection active.<br />Enter security passcode to unlock system variables.</p>
                            
                            <form onSubmit={handleUnlock} class="space-y-4">
                                <div class="relative">
                                    <input 
                                        type="password" 
                                        placeholder="••••"
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        class={`w-full bg-slate-950 border text-center text-xl font-bold tracking-widest text-white rounded-xl py-3 px-4 focus:outline-none transition-all ${passwordError ? 'border-rose-500 ring-2 ring-rose-500/20' : 'border-slate-800 focus:border-indigo-500'}`}
                                        autoFocus
                                    />
                                    {passwordError && (
                                        <p class="text-rose-400 text-[11px] font-semibold mt-1.5 animate-bounce">Access denied. Passcode invalid.</p>
                                    )}
                                </div>
                                <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition-all shadow-lg shadow-indigo-600/10">
                                    Access Ledger
                                </button>

                                            <div class="flex justify-between items-center py-2.5">
                                                <span class="text-xs text-slate-400">Overall Business ROI %</span>
                                                <span class="text-sm font-bold text-indigo-400">{stats.roi.toFixed(1)}%</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl">
                                        <h3 class="text-sm font-bold text-slate-400 tracking-wide uppercase mb-4">Inventory Valuations</h3>
                                        <div class="space-y-4">
                                            <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                                <span class="text-xs text-slate-400">Total Assets In Stock</span>
                                                <span class="text-sm font-bold text-white">{stats.phonesInStock} units</span>
                                            </div>
                                            <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                                <span class="text-xs text-slate-400">Total Capital Currently Frozen</span>
                                                <span class="text-sm font-bold text-white">{stats.inventoryCost}€</span>
                                            </div>
                                            <div class="flex justify-between items-center py-2.5">
                                                <span class="text-xs text-slate-400">Expected Value on Liquidation</span>
                                                <span class="text-sm font-bold text-indigo-400">{stats.inventoryMarketValue}€</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl">
                                        <h3 class="text-sm font-bold text-slate-400 tracking-wide uppercase mb-4">Velocity Metrics</h3>
                                        <div class="space-y-4">
                                            <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                                <span class="text-xs text-slate-400">Fastest Turnaround</span>
                                                <span class="text-sm font-bold text-emerald-400">{stats.fastestSale} Days</span>
                                            </div>
                                            <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                                <span class="text-xs text-slate-400">Slowest Turnaround</span>
                                                <span class="text-sm font-bold text-rose-400">{stats.slowestSale} Days</span>
                                            </div>
                                            <div class="flex justify-between items-center py-2.5">
                                                <span class="text-xs text-slate-400">Average Velocity to Liquidate</span>
                                                <span class="text-sm font-bold text-white">{stats.avgDays.toFixed(1)} Days</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* TOAST SYSTEM */}
                    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 max-w-sm w-full">
                        {toasts.map(t => (
                            <div key={t.id} class="p-4 bg-slate-900 border border-slate-800 text-slate-200 rounded-xl shadow-2xl flex items-start gap-3">
                                <span class="mt-0.5"><Icons.Info /></span>
                                <div class="text-xs font-semibold">{t.message}</div>
                            </div>
                        ))}
                    </div>

                    {/* ADD MODAL */}
                    {isAddModalOpen && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl overflow-hidden">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Register New Purchase</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleAddPhone({
                                        model: fd.get('model'),
                                        imei: fd.get('imei'),
                                        buyPrice: Number(fd.get('buyPrice')),
                                        expectedSellPrice: Number(fd.get('expectedSellPrice')),
                                        actualSellPrice: null,
                                        buyDate: fd.get('buyDate'),
                                        sellDate: null,
                                        reinvestment: fd.get('reinvestment') === 'on',
                                        notes: fd.get('notes')
                                    });
                                    setIsAddModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Model Name *</label>
                                            <input required name="model" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">IMEI</label>
                                            <input name="imei" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Buy Price (€) *</label>
                                            <input required name="buyPrice" type="number" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Expected Sale Price (€) *</label>
                                            <input required name="expectedSellPrice" type="number" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Purchase Date *</label>
                                        <input required name="buyDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Internal Notes</label>
                                        <textarea name="notes" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white"></textarea>
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
                                        <input type="checkbox" name="reinvestment" id="chk" class="w-4 h-4 text-indigo-600 rounded bg-slate-950 border-slate-800" />
                                        <label for="chk" class="text-xs text-slate-300 font-bold cursor-pointer">Reinvestment Buy (Immediately subtracts from Cash Balance)</label>
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} class="px-4 py-2 border border-slate-800 rounded-xl text-sm">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold">Register Unit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {isEditModalOpen && selectedPhone && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl overflow-hidden">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Edit Phone Details</h3>
                                    <button onClick={() => setIsEditModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleEditPhone({
                                        ...selectedPhone,
                                        model: fd.get('model'),
                                        imei: fd.get('imei'),
                                        buyPrice: Number(fd.get('buyPrice')),
                                        expectedSellPrice: Number(fd.get('expectedSellPrice')),
                                        actualSellPrice: fd.get('actualSellPrice') ? Number(fd.get('actualSellPrice')) : null,
                                        buyDate: fd.get('buyDate'),
                                        sellDate: fd.get('sellDate') || null,
                                        reinvestment: fd.get('reinvestment') === 'on',
                                        notes: fd.get('notes')
                                    });
                                    setIsEditModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Model Name *</label>
                                            <input required name="model" type="text" defaultValue={selectedPhone.model} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">IMEI</label>
                                            <input name="imei" type="text" defaultValue={selectedPhone.imei || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-3 gap-3">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Buy Price *</label>
                                            <input required name="buyPrice" type="number" defaultValue={selectedPhone.buyPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Expected Sale *</label>
                                            <input required name="expectedSellPrice" type="number" defaultValue={selectedPhone.expectedSellPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Actual Sold Price</label>
                                            <input name="actualSellPrice" type="number" defaultValue={selectedPhone.actualSellPrice || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Purchase Date</label>
                                            <input required name="buyDate" type="date" defaultValue={selectedPhone.buyDate} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1">Sell Date (blank if unsold)</label>
                                            <input name="sellDate" type="date" defaultValue={selectedPhone.sellDate || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white" />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Notes</label>
                                        <textarea name="notes" defaultValue={selectedPhone.notes || ""} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white"></textarea>
                                    </div>
                                    <div class="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
                                        <input type="checkbox" name="reinvestment" id="chk2" defaultChecked={selectedPhone.reinvestment} class="w-4 h-4 text-indigo-600 rounded bg-slate-950 border-slate-800" />
                                        <label for="chk2" class="text-xs text-slate-300 font-bold cursor-pointer">Reinvestment Buy</label>
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsEditModalOpen(false)} class="px-4 py-2 border border-slate-800 rounded-xl text-sm">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* SELL CONFIRM MODAL */}
                    {isSellModalOpen && selectedPhone && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-sm rounded-2xl overflow-hidden">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Record Sale Details</h3>
                                    <button onClick={() => setIsSellModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const price = Number(fd.get('actualSellPrice'));
                                    const date = fd.get('sellDate');

                                    const updated = phones.map(p => {
                                        if (p.id === selectedPhone.id) {
                                            return {
                                                ...p,
                                                actualSellPrice: price,
                                                sellDate: date,
                                                sellSequence: Date.now()
                                            };
                                        }
                                        return p;
                                    });
                                    updatePhonesAndPersist(updated);
                                    setIsSellModalOpen(false);
                                    triggerToast(`Sold ${selectedPhone.model} for ${price}€!`, 'success');
                                }} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Actual Sold Price (€) *</label>
                                        <input required name="actualSellPrice" type="number" defaultValue={selectedPhone.expectedSellPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1">Sell Date *</label>
                                        <input required name="sellDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsSellModalOpen(false)} class="px-4 py-2 border border-slate-800 rounded-xl text-sm">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-bold">Complete Sale</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

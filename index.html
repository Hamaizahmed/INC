<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFlow - Premium Phone Flipping Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for rendering JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f8fafc;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Custom SVGs corresponding to Lucide icons for reliable offline/direct loading
        const Icons = {
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-trending-up"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-trending-down"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
            Euro: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-euro"><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg>,
            Layers: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-layers"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/></svg>,
            ShoppingCart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            BarChart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-bar-chart-3"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
            Filter: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-filter"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-upload"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-pencil"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
            ArrowUpRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-arrow-up-right"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>,
            Tag: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-tag"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l4.72-4.72c.94-.94.94-2.48 0-3.42z"/><path d="m6 6 .01-.01"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class="lucide lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        };

        // Real initial mock sequence based on prompt parameters
        const defaultPhones = [
            {
                id: 'mock-1',
                model: 'Note 14',
                imei: '358912345678901',
                buyPrice: 103,
                expectedSellPrice: 140,
                actualSellPrice: 149,
                buyDate: '2025-07-04',
                sellDate: '2025-07-11',
                reinvestment: false,
                notes: 'Initial Capital Purchase',
                buySequence: 1720051200000,
                sellSequence: 1720656000000
            },
            {
                id: 'mock-2',
                model: 'A07',
                imei: '358912345678902',
                buyPrice: 92,
                expectedSellPrice: 120,
                actualSellPrice: 125,
                buyDate: '2025-07-04',
                sellDate: '2025-07-11',
                reinvestment: false,
                notes: 'Initial Capital Purchase',
                buySequence: 1720051200001,
                sellSequence: 1720656000001
            },
            {
                id: 'mock-3',
                model: 'A17',
                imei: '358912345678903',
                buyPrice: 119,
                expectedSellPrice: 160,
                actualSellPrice: 169,
                buyDate: '2025-07-04',
                sellDate: '2025-07-20',
                reinvestment: false,
                notes: 'Initial Capital Purchase',
                buySequence: 1720051200002,
                sellSequence: 1721433600001
            },
            {
                id: 'mock-4',
                model: 'A07',
                imei: '358912345678904',
                buyPrice: 96,
                expectedSellPrice: 120,
                actualSellPrice: 129,
                buyDate: '2025-07-16',
                sellDate: '2025-07-20',
                reinvestment: true,
                notes: 'First Reinvestment Phone',
                buySequence: 1721088000000,
                sellSequence: 1721433600000
            }
        ];

        function App() {
            const [phones, setPhones] = useState(() => {
                const local = localStorage.getItem('flipflow_inventory');
                return local ? JSON.parse(local) : defaultPhones;
            });

            const [toasts, setToasts] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Search & Filtering States
            const [searchTerm, setSearchTerm] = useState('');
            const [filterModel, setFilterModel] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterReinvestment, setFilterReinvestment] = useState('all');
            const [filterMonth, setFilterMonth] = useState('');
            const [sortField, setSortField] = useState('buyDate');
            const [sortDirection, setSortDirection] = useState('desc');

            // Modals
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isSellModalOpen, setIsSellModalOpen] = useState(false);
            const [selectedPhone, setSelectedPhone] = useState(null);

            // Save to localStorage
            useEffect(() => {
                localStorage.setItem('flipflow_inventory', JSON.stringify(phones));
            }, [phones]);

            // Toast triggering Helper
            const triggerToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };

            // Dynamic Ledger & Cash calculation
            const ledger = useMemo(() => {
                let list = [];
                phones.forEach(p => {
                    // Purchase Event
                    list.push({
                        id: `${p.id}-buy`,
                        phoneId: p.id,
                        date: p.buyDate,
                        sequence: p.buySequence || Date.now(),
                        model: p.model,
                        type: p.reinvestment ? 'REINVEST_BUY' : 'INITIAL_BUY',
                        amount: p.reinvestment ? -Number(p.buyPrice) : 0,
                        description: p.reinvestment 
                            ? `Reinvestment Purchase — ${p.model}` 
                            : `Initial Inventory — ${p.model}`
                    });

                    // Sell Event
                    if (p.sellDate) {
                        list.push({
                            id: `${p.id}-sell`,
                            phoneId: p.id,
                            date: p.sellDate,
                            sequence: p.sellSequence || Date.now() + 1,
                            model: p.model,
                            type: 'SELL',
                            amount: Number(p.actualSellPrice || p.expectedSellPrice),
                            description: `Sold — ${p.model}`
                        });
                    }
                });

                // Correct chronological ordering with sequence breaking ties
                list.sort((a, b) => {
                    const diff = new Date(a.date) - new Date(b.date);
                    if (diff !== 0) return diff;
                    return a.sequence - b.sequence;
                });

                // Compute running cumulative balance
                let currentBalance = 0;
                return list.map(item => {
                    currentBalance += item.amount;
                    return {
                        ...item,
                        balance: currentBalance
                    };
                });
            }, [phones]);

            // Core Financial Statistics Engine
            const stats = useMemo(() => {
                const availableCash = ledger.length > 0 ? ledger[ledger.length - 1].balance : 0;
                
                let inventoryCost = 0;
                let inventoryMarketValue = 0;
                let totalSales = 0;
                let totalProfit = 0;
                let phonesSold = 0;
                let phonesInStock = 0;
                let totalDaysToSell = 0;
                let profitPhonePrices = 0; // Buy price sum of sold phones for ROI

                let minDays = Infinity;
                let maxDays = -Infinity;
                let highestProfit = -Infinity;
                let lowestProfit = Infinity;
                let highestProfitPhone = null;
                let lowestProfitPhone = null;

                const modelProfits = {};

                phones.forEach(p => {
                    const isSold = !!p.sellDate;
                    if (!isSold) {
                        inventoryCost += Number(p.buyPrice);
                        inventoryMarketValue += Number(p.expectedSellPrice);
                        phonesInStock++;
                    } else {
                        const sellVal = Number(p.actualSellPrice || p.expectedSellPrice);
                        const buyVal = Number(p.buyPrice);
                        const profit = sellVal - buyVal;
                        
                        totalSales += sellVal;
                        totalProfit += profit;
                        phonesSold++;
                        profitPhonePrices += buyVal;

                        // Days calculation
                        const days = Math.max(0, Math.round((new Date(p.sellDate) - new Date(p.buyDate)) / (1000 * 60 * 60 * 24)));
                        totalDaysToSell += days;

                        if (days < minDays) minDays = days;
                        if (days > maxDays) maxDays = days;

                        if (profit > highestProfit) {
                            highestProfit = profit;
                            highestProfitPhone = p;
                        }
                        if (profit < lowestProfit) {
                            lowestProfit = profit;
                            lowestProfitPhone = p;
                        }

                        // Model aggregation
                        modelProfits[p.model] = (modelProfits[p.model] || 0) + profit;
                    }
                });

                // Best/Worst Performing Models
                let bestModel = 'None';
                let bestVal = -Infinity;
                let worstModel = 'None';
                let worstVal = Infinity;

                Object.keys(modelProfits).forEach(m => {
                    if (modelProfits[m] > bestVal) {
                        bestVal = modelProfits[m];
                        bestModel = m;
                    }
                    if (modelProfits[m] < worstVal) {
                        worstVal = modelProfits[m];
                        worstModel = m;
                    }
                });

                return {
                    availableCash,
                    inventoryCost,
                    inventoryMarketValue,
                    totalSales,
                    totalProfit,
                    phonesSold,
                    phonesInStock,
                    avgProfit: phonesSold > 0 ? totalProfit / phonesSold : 0,
                    avgDays: phonesSold > 0 ? totalDaysToSell / phonesSold : 0,
                    roi: profitPhonePrices > 0 ? (totalProfit / profitPhonePrices) * 100 : 0,
                    highestProfit: highestProfit === -Infinity ? 0 : highestProfit,
                    highestProfitPhone,
                    lowestProfit: lowestProfit === Infinity ? 0 : lowestProfit,
                    lowestProfitPhone,
                    fastestSale: minDays === Infinity ? 0 : minDays,
                    slowestSale: maxDays === -Infinity ? 0 : maxDays,
                    bestModel,
                    worstModel,
                    totalCapitalSpent: phones.reduce((acc, p) => acc + Number(p.buyPrice), 0)
                };
            }, [phones, ledger]);

            // Filtered and Sorted Phone Inventory
            const filteredPhones = useMemo(() => {
                let res = [...phones];

                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    res = res.filter(p => 
                        p.model.toLowerCase().includes(term) || 
                        (p.imei && p.imei.toLowerCase().includes(term)) ||
                        (p.notes && p.notes.toLowerCase().includes(term))
                    );
                }

                if (filterModel) {
                    res = res.filter(p => p.model === filterModel);
                }

                if (filterStatus !== 'all') {
                    res = res.filter(p => filterStatus === 'sold' ? !!p.sellDate : !p.sellDate);
                }

                if (filterReinvestment !== 'all') {
                    const val = filterReinvestment === 'yes';
                    res = res.filter(p => p.reinvestment === val);
                }

                if (filterMonth) {
                    res = res.filter(p => {
                        const date = p.sellDate || p.buyDate;
                        return date && date.startsWith(filterMonth);
                    });
                }

                // Sort logic
                res.sort((a, b) => {
                    let valA, valB;
                    if (sortField === 'profit') {
                        valA = a.sellDate ? (Number(a.actualSellPrice) - Number(a.buyPrice)) : -Infinity;
                        valB = b.sellDate ? (Number(b.actualSellPrice) - Number(b.buyPrice)) : -Infinity;
                    } else if (sortField === 'daysToSell') {
                        valA = a.sellDate ? Math.round((new Date(a.sellDate) - new Date(a.buyDate)) / 86400000) : -Infinity;
                        valB = b.sellDate ? Math.round((new Date(b.sellDate) - new Date(b.buyDate)) / 86400000) : -Infinity;
                    } else {
                        valA = a[sortField];
                        valB = b[sortField];
                    }

                    if (valA === undefined || valA === null) return 1;
                    if (valB === undefined || valB === null) return -1;

                    if (typeof valA === 'string') {
                        return sortDirection === 'asc' 
                            ? valA.localeCompare(valB) 
                            : valB.localeCompare(valA);
                    } else {
                        return sortDirection === 'asc' ? valA - valB : valB - valA;
                    }
                });

                return res;
            }, [phones, searchTerm, filterModel, filterStatus, filterReinvestment, filterMonth, sortField, sortDirection]);

            // Available unique model names for filtering dropdowns
            const uniqueModels = useMemo(() => {
                return [...new Set(phones.map(p => p.model))];
            }, [phones]);

            // Create Phone Record
            const handleAddPhone = (formData) => {
                const newPhone = {
                    ...formData,
                    id: 'phone-' + Date.now(),
                    buySequence: Date.now(),
                    sellSequence: formData.sellDate ? Date.now() + 1 : null
                };

                setPhones(prev => [...prev, newPhone]);
                triggerToast(`Inventory entry added: ${formData.model}`, 'success');

                // Real-time automatic business safety warnings
                if (phones.filter(p => !p.sellDate).length <= 2) {
                    triggerToast("Low Stock Warning: Available phones in stock are low.", "warning");
                }
            };

            // Update Phone Record
            const handleEditPhone = (updatedPhone) => {
                setPhones(prev => prev.map(p => {
                    if (p.id === updatedPhone.id) {
                        // Notify updates on important transitions
                        if (!p.sellDate && updatedPhone.sellDate) {
                            const profit = Number(updatedPhone.actualSellPrice || updatedPhone.expectedSellPrice) - Number(updatedPhone.buyPrice);
                            triggerToast(`Sale completed: +${updatedPhone.actualSellPrice}€ for ${updatedPhone.model}!`, 'success');
                            if (profit >= 50) {
                                triggerToast(`Excellent work! Large profit of ${profit}€ achieved on this unit.`, 'success');
                            }
                        }
                        return {
                            ...updatedPhone,
                            sellSequence: updatedPhone.sellDate && !p.sellDate ? Date.now() : p.sellSequence
                        };
                    }
                    return p;
                }));
                triggerToast(`Updated successfully: ${updatedPhone.model}`, 'info');
            };

            // Delete Phone
            const handleDeletePhone = (id) => {
                const target = phones.find(p => p.id === id);
                if (window.confirm(`Are you sure you want to delete ${target.model}? This action changes ledger history.`)) {
                    setPhones(prev => prev.filter(p => p.id !== id));
                    triggerToast(`Entry deleted: ${target.model}`, 'warning');
                }
            };

            // Quick sell action from table
            const handleQuickSell = (phone) => {
                setSelectedPhone(phone);
                setIsSellModalOpen(true);
            };

            // JSON / CSV Import & Export handlers
            const exportJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(phones, null, 2));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `flipflow_backup_${new Date().toISOString().split('T')[0]}.json`);
                dlAnchorElem.click();
                triggerToast("Local JSON database exported", "success");
            };

            const importJSON = (e) => {
                const fileReader = new FileReader();
                fileReader.onload = event => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            setPhones(parsed);
                            triggerToast("Database successfully restored from JSON file!", "success");
                        } else {
                            triggerToast("Invalid format. Expecting JSON array.", "warning");
                        }
                    } catch (err) {
                        triggerToast("Failed to parse file structure.", "warning");
                    }
                };
                fileReader.readAsText(e.target.files[0]);
            };

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "Phone Model,IMEI,Buy Price,Expected Sell Price,Actual Sell Price,Buy Date,Sell Date,Reinvestment,Notes\n";
                phones.forEach(p => {
                    const row = [
                        `"${p.model}"`,
                        `"${p.imei || ''}"`,
                        p.buyPrice,
                        p.expectedSellPrice,
                        p.actualSellPrice || '',
                        p.buyDate,
                        p.sellDate || '',
                        p.reinvestment ? 'Yes' : 'No',
                        `"${p.notes || ''}"`
                    ].join(",");
                    csvContent += row + "\n";
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `flipflow_export_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                triggerToast("CSV Sheet exported successfully", "success");
            };

            return (
                <div class="flex flex-col md:flex-row min-h-screen text-slate-100 bg-slate-950">
                    {/* Responsive Navigation Sidebar */}
                    <aside class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 p-6 flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-8">
                                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/20">
                                    <Icons.Euro />
                                </div>
                                <div>
                                    <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">FlipFlow</h1>
                                    <span class="text-xs text-indigo-400 font-semibold tracking-wider uppercase">Ledger Hub</span>
                                </div>
                            </div>

                            <nav class="space-y-1.5">
                                <button 
                                    onClick={() => setActiveTab('dashboard')} 
                                    class={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/10' : 'text-slate-400 hover:bg-slate-800/60 hover:text-white'}`}
                                >
                                    <Icons.BarChart /> Dashboard
                                </button>
                                <button 
                                    onClick={() => setActiveTab('inventory')} 
                                    class={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all duration-200 ${activeTab === 'inventory' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/10' : 'text-slate-400 hover:bg-slate-800/60 hover:text-white'}`}
                                >
                                    <Icons.Layers /> Inventory Manager
                                </button>
                                <button

                                            <span class="text-sm font-bold text-emerald-400">{stats.totalProfit}€</span>
                                        </div>
                                        <div class="flex justify-between items-center py-2.5">
                                            <span class="text-xs text-slate-400">Overall Business ROI %</span>
                                            <span class="text-sm font-bold text-indigo-400">{stats.roi.toFixed(1)}%</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl">
                                    <h3 class="text-sm font-bold text-slate-400 tracking-wide uppercase mb-4">Inventory Valuations</h3>
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                            <span class="text-xs text-slate-400">Total Assets In Stock</span>
                                            <span class="text-sm font-bold text-white">{stats.phonesInStock} units</span>
                                        </div>
                                        <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                            <span class="text-xs text-slate-400">Total Capital Currently Frozen</span>
                                            <span class="text-sm font-bold text-white">{stats.inventoryCost}€</span>
                                        </div>
                                        <div class="flex justify-between items-center py-2.5">
                                            <span class="text-xs text-slate-400">Expected Value on Liquidation</span>
                                            <span class="text-sm font-bold text-indigo-400">{stats.inventoryMarketValue}€</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="bg-slate-900/40 border border-slate-800/80 p-5 rounded-2xl">
                                    <h3 class="text-sm font-bold text-slate-400 tracking-wide uppercase mb-4">Unit Leaderboards</h3>
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                            <span class="text-xs text-slate-400">Best Performing Model Group</span>
                                            <span class="text-sm font-bold text-emerald-400">{stats.bestModel}</span>
                                        </div>
                                        <div class="flex justify-between items-center py-2.5 border-b border-slate-800/40">
                                            <span class="text-xs text-slate-400">Weakest Model Group</span>
                                            <span class="text-sm font-bold text-rose-400">{stats.worstModel}</span>
                                        </div>
                                        <div class="flex justify-between items-center py-2.5">
                                            <span class="text-xs text-slate-400">Average Velocity to Liquidate</span>
                                            <span class="text-sm font-bold text-white">{stats.avgDays.toFixed(1)} Days</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* TOAST NOTIFICATION STACK */}
                    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2.5 max-w-sm w-full">
                        {toasts.map(t => (
                            <div 
                                key={t.id} 
                                class={`p-4 rounded-xl shadow-2xl flex items-start gap-3 border transition-all duration-300 transform translate-y-0 ${t.type === 'success' ? 'bg-emerald-950/90 border-emerald-800/80 text-emerald-100' : t.type === 'warning' ? 'bg-amber-950/90 border-amber-800/80 text-amber-100' : 'bg-slate-900/95 border-slate-800 text-slate-100'}`}
                            >
                                <span class="mt-0.5"><Icons.Info /></span>
                                <div class="text-xs font-semibold leading-relaxed">{t.message}</div>
                            </div>
                        ))}
                    </div>

                    {/* ADD PHONE MODAL */}
                    {isAddModalOpen && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Register New Inventory Entry</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleAddPhone({
                                        model: fd.get('model'),
                                        imei: fd.get('imei'),
                                        buyPrice: Number(fd.get('buyPrice')),
                                        expectedSellPrice: Number(fd.get('expectedSellPrice')),
                                        actualSellPrice: fd.get('actualSellPrice') ? Number(fd.get('actualSellPrice')) : null,
                                        buyDate: fd.get('buyDate'),
                                        sellDate: fd.get('sellDate') || null,
                                        reinvestment: fd.get('reinvestment') === 'on',
                                        notes: fd.get('notes')
                                    });
                                    setIsAddModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Phone Model *</label>
                                            <input required name="model" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">IMEI (Optional)</label>
                                            <input name="imei" type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-3 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Buy Price (€) *</label>
                                            <input required name="buyPrice" type="number" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Expected Price (€) *</label>
                                            <input required name="expectedSellPrice" type="number" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Actual Sell Price (€)</label>
                                            <input name="actualSellPrice" type="number" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Buy Date *</label>
                                            <input required name="buyDate" type="date" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Sell Date (Blank if Unsold)</label>
                                            <input name="sellDate" type="date" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Notes / Condition</label>
                                        <textarea name="notes" rows="2" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"></textarea>
                                    </div>

                                    <div class="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
                                        <input type="checkbox" name="reinvestment" id="reinvest_check" class="w-4.5 h-4.5 bg-slate-950 rounded text-indigo-600 border-slate-800 focus:ring-0" />
                                        <label for="reinvest_check" class="text-xs text-slate-300 font-semibold cursor-pointer">Reinvestment Purchase (Reduces running cash balance immediately)</label>
                                    </div>

                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} class="px-4 py-2 border border-slate-800 hover:bg-slate-800 rounded-xl text-sm font-medium transition-colors">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-lg transition-all">Add Unit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* EDIT PHONE MODAL */}
                    {isEditModalOpen && selectedPhone && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Edit Phone Properties</h3>
                                    <button onClick={() => setIsEditModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleEditPhone({
                                        ...selectedPhone,
                                        model: fd.get('model'),
                                        imei: fd.get('imei'),
                                        buyPrice: Number(fd.get('buyPrice')),
                                        expectedSellPrice: Number(fd.get('expectedSellPrice')),
                                        actualSellPrice: fd.get('actualSellPrice') ? Number(fd.get('actualSellPrice')) : null,
                                        buyDate: fd.get('buyDate'),
                                        sellDate: fd.get('sellDate') || null,
                                        reinvestment: fd.get('reinvestment') === 'on',
                                        notes: fd.get('notes')
                                    });
                                    setIsEditModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Phone Model *</label>
                                            <input required name="model" defaultValue={selectedPhone.model} type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">IMEI (Optional)</label>
                                            <input name="imei" defaultValue={selectedPhone.imei} type="text" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-3 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Buy Price (€) *</label>
                                            <input required name="buyPrice" defaultValue={selectedPhone.buyPrice} type="number" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Expected Price (€) *</label>
                                            <input required name="expectedSellPrice" defaultValue={selectedPhone.expectedSellPrice} type="number" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Actual Sell Price (€)</label>
                                            <input name="actualSellPrice" defaultValue={selectedPhone.actualSellPrice || ""} type="number" step="0.01" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Buy Date *</label>
                                            <input required name="buyDate" defaultValue={selectedPhone.buyDate} type="date" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-400 mb-1.5">Sell Date</label>
                                            <input name="sellDate" defaultValue={selectedPhone.sellDate || ""} type="date" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                        </div>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Notes / Condition</label>
                                        <textarea name="notes" defaultValue={selectedPhone.notes || ""} rows="2" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none"></textarea>
                                    </div>

                                    <div class="flex items-center gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
                                        <input type="checkbox" name="reinvestment" id="edit_reinvest_check" defaultChecked={selectedPhone.reinvestment} class="w-4.5 h-4.5 bg-slate-950 rounded text-indigo-600 border-slate-800 focus:ring-0" />
                                        <label for="edit_reinvest_check" class="text-xs text-slate-300 font-semibold cursor-pointer">Reinvestment Purchase (Reduces running cash balance immediately)</label>
                                    </div>

                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsEditModalOpen(false)} class="px-4 py-2 border border-slate-800 hover:bg-slate-800 rounded-xl text-sm font-medium transition-colors">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-lg transition-all">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* SELL UNIT QUICK MODAL */}
                    {isSellModalOpen && selectedPhone && (
                        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
                                <header class="px-6 py-5 border-b border-slate-800 flex justify-between items-center">
                                    <h3 class="text-lg font-bold">Log Sale Event: {selectedPhone.model}</h3>
                                    <button onClick={() => setIsSellModalOpen(false)} class="text-slate-400 hover:text-white">✕</button>
                                </header>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleEditPhone({
                                        ...selectedPhone,
                                        actualSellPrice: Number(fd.get('actualSellPrice')),
                                        sellDate: fd.get('sellDate')
                                    });
                                    setIsSellModalOpen(false);
                                }} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Actual Sell Price (€) *</label>
                                        <input required name="actualSellPrice" type="number" step="0.01" defaultValue={selectedPhone.expectedSellPrice} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Sell Date *</label>
                                        <input required name="sellDate" type="date" defaultValue={new Date().toISOString().split('T')[0]} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2 text-sm text-white focus:outline-none" />
                                    </div>
                                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                                        <button type="button" onClick={() => setIsSellModalOpen(false)} class="px-4 py-2 border border-slate-800 hover:bg-slate-800 rounded-xl text-sm font-medium transition-colors">Cancel</button>
                                        <button type="submit" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-bold shadow-lg transition-all">Confirm Sale</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
